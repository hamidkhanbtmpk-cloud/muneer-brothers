{% extends 'base.html' %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
    body {
        background-color: #050505;
        color: #ffffff;
        font-family: 'Rajdhani', sans-serif;
    }

    .login-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .login-card {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(15px);
        border: 1px solid rgba(0, 242, 254, 0.2);
        border-radius: 15px;
        padding: 40px;
        width: 100%;
        max-width: 450px;
        box-shadow: 0 0 30px rgba(0, 242, 254, 0.1);
    }

    .login-header h2 {
        font-family: 'Orbitron', sans-serif;
        background: -webkit-linear-gradient(#00f2fe, #4facfe);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .form-label {
        color: #00f2fe;
        text-transform: uppercase;
        font-weight: 600;
        font-size: 14px;
        letter-spacing: 1px;
    }

    .form-control {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        border-radius: 4px;
        padding: 12px;
    }

    .form-control:focus {
        background: rgba(255, 255, 255, 0.1);
        border-color: #00f2fe;
        color: white;
        box-shadow: 0 0 15px rgba(0, 242, 254, 0.3);
    }

    .btn-neon {
        background: transparent;
        color: #00f2fe;
        border: 2px solid #00f2fe;
        box-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
        border-radius: 4px;
        text-transform: uppercase;
        font-weight: 700;
        letter-spacing: 2px;
        width: 100%;
        padding: 12px;
        margin-top: 20px;
        transition: 0.4s;
    }

    .btn-neon:hover {
        background: #00f2fe;
        color: #000;
        box-shadow: 0 0 25px rgba(0, 242, 254, 0.8);
    }

    .security-icon {
        font-size: 3rem;
        color: #00f2fe;
        margin-bottom: 20px;
        text-shadow: 0 0 15px rgba(0, 242, 254, 0.5);
    }
</style>

<div class="login-container">
    <div class="login-card text-center">
        <div class="security-icon">
            <i class="bi bi-shield-lock"></i>
        </div>
        <div class="login-header mb-4">
            <h2>Admin Login</h2>
            <p class="text-secondary small">Restricted Access - Muneer Brothers Portal</p>
        </div>

        <form method="POST" action="{{ url_for('routes.admin_login') }}">
            <div class="mb-3 text-start">
                <label class="form-label">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter Admin ID" required>
            </div>
            <div class="mb-4 text-start">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-neon">Initiate Override</button>
        </form>
    </div>
</div>
{% endblock %}
