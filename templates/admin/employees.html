{% extends 'base.html' %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
    body {
        background-color: #050505;
        color: #ffffff;
        font-family: 'Rajdhani', sans-serif;
    }
    .admin-card {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(0, 242, 254, 0.2);
        border-radius: 12px;
        padding: 30px;
        margin-bottom: 30px;
    }
    .hero-title-sm {
        font-family: 'Orbitron', sans-serif;
        background: -webkit-linear-gradient(#00f2fe, #4facfe);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
    }
    .form-control {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
    }
    .form-control:focus {
        background: rgba(255, 255, 255, 0.1);
        border-color: #00f2fe;
        color: white;
        box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
    }
    .btn-neon {
        background: transparent;
        color: #00f2fe;
        border: 2px solid #00f2fe;
        box-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
        font-weight: 700;
        text-transform: uppercase;
        transition: 0.4s;
    }
    .btn-neon:hover {
        background: #00f2fe;
        color: #000;
        box-shadow: 0 0 20px rgba(0, 242, 254, 0.8);
    }
    .expert-row {
        background: rgba(255,255,255,0.03);
        border-radius: 8px;
        padding: 15px;
        margin-bottom: 15px;
        border-left: 4px solid #00f2fe;
    }
    .action-btns .btn {
        padding: 2px 8px;
        font-size: 14px;
    }
</style>

<div class="container mt-5 pt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="hero-title-sm">Expert Management</h2>
        <a href="{{ url_for('routes.index') }}" class="btn btn-outline-light btn-sm text-uppercase">View Site</a>
    </div>

    <div class="row">
        <div class="col-lg-5">
            <div class="admin-card">
                <h4 class="mb-4 text-info"><i class="bi bi-person-plus me-2"></i>Add New Expert</h4>
                <form method="POST" action="{{ url_for('routes.manage_employees') }}" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="small text-uppercase text-secondary fw-bold">Serial Number (Ranking)</label>
                        <input type="number" name="serial_no" class="form-control" placeholder="1 for Top" value="1" required>
                    </div>
                    <div class="mb-3">
                        <label class="small text-uppercase text-secondary fw-bold">Full Name</label>
                        <input type="text" name="name" class="form-control" placeholder="e.g. Zeshan Khan" required>
                    </div>
                    <div class="mb-3">
                        <label class="small text-uppercase text-secondary fw-bold">Designation</label>
                        <input type="text" name="designation" class="form-control" placeholder="e.g. Networking Expert" required>
                    </div>
                    <div class="mb-3">
                        <label class="small text-uppercase text-secondary fw-bold">Expertise Details</label>
                        <textarea name="description" class="form-control" rows="4" placeholder="Describe their experience..." required></textarea>
                    </div>
                    <div class="mb-4">
                        <label class="small text-uppercase text-secondary fw-bold">Profile Image</label>
                        <input type="file" name="image" class="form-control" accept="image/*" required>
                    </div>
                    <button type="submit" class="btn btn-neon w-100 py-3">Deploy Expert Data</button>
                </form>
            </div>
        </div>

        <div class="col-lg-7">
            <div class="admin-card">
                <h4 class="mb-4 text-info"><i class="bi bi-people me-2"></i>Active Personnel</h4>
                {% if employees %}
                    {% for emp in employees %}
                    <div class="expert-row d-flex align-items-center justify-content-between">
                        <div class="d-flex align-items-center gap-3">
                            <span class="badge bg-info text-dark fw-bold">#{{ emp.serial_no }}</span>
                            <img src="{{ url_for('static', filename='uploads/' + emp.image_file) }}" class="rounded-circle" style="width: 50px; height: 50px; object-fit: cover; border: 1px solid #00f2fe;">
                            <div>
                                <h6 class="mb-0 fw-bold">{{ emp.name }}</h6>
                                <small class="text-info">{{ emp.designation }}</small>
                            </div>
                        </div>
                        <div class="action-btns">
                            <a href="{{ url_for('routes.edit_employee', id=emp.id) }}" class="btn btn-outline-warning btn-sm me-1"><i class="bi bi-pencil-square"></i></a>
                            <a href="{{ url_for('routes.delete_employee', id=emp.id) }}" class="btn btn-outline-danger btn-sm" onclick="return confirm('Kya aap waqai is expert ko delete karna chahte hain?')"><i class="bi bi-trash"></i></a>
                        </div>
                    </div>
                    {% endfor %}
                {% else %}
                    <div class="text-center py-5">
                        <i class="bi bi-database-exclamation text-secondary fs-1"></i>
                        <p class="text-secondary mt-3">No experts deployed yet.</p>
                    </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
