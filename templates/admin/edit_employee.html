{% extends 'base.html' %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
    body {
        background-color: #f8f9fa; /* Consistent light background for admin */
        color: #0d0d0d;
        font-family: 'DM Sans', sans-serif;
    }

    .admin-card {
        background: #ffffff;
        border: 1px solid #e8e4dd;
        border-radius: 8px;
        padding: 48px;
        margin-top: 50px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.02);
    }

    .hero-title-sm {
        font-family: 'Cormorant Garamond', serif;
        font-size: 32px;
        font-weight: 600;
        color: #0d0d0d;
        margin: 0;
    }

    .form-label-custom {
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #8a8a8a;
        margin-bottom: 10px;
        display: block;
    }

    .form-control-custom {
        background: #ffffff;
        border: 1px solid #e8e4dd;
        color: #0d0d0d;
        padding: 14px 18px;
        font-size: 14px;
        width: 100%;
        transition: all 0.3s;
        border-radius: 4px;
    }

    .form-control-custom:focus {
        outline: none;
        border-color: #b8975a;
        box-shadow: 0 0 0 3px rgba(184, 151, 90, 0.1);
    }

    .btn-gold-submit {
        font-family: 'DM Sans', sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #ffffff;
        background: #0d0d0d;
        border: none;
        padding: 16px 32px;
        cursor: pointer;
        transition: all 0.3s;
        border-radius: 4px;
    }

    .btn-gold-submit:hover {
        background: #b8975a;
    }

    .btn-outline-custom {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #3a3a3a;
        background: transparent;
        border: 1px solid #e8e4dd;
        padding: 10px 20px;
        border-radius: 4px;
        text-decoration: none;
        transition: all 0.3s;
    }

    .btn-outline-custom:hover {
        background: #f0ede8;
        color: #0d0d0d;
    }

    .current-img {
        width: 90px;
        height: 90px;
        object-fit: cover;
        border: 1px solid #e8e4dd;
        border-radius: 4px;
        padding: 4px;
        background: #faf8f5;
    }

    .help-text {
        font-size: 12px;
        color: #8a8a8a;
        margin-top: 6px;
        display: block;
    }
</style>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="admin-card">
                <div class="d-flex justify-content-between align-items-center mb-5">
                    <h2 class="hero-title-sm">Edit Expert Profile</h2>
                    <a href="{{ url_for('routes.manage_employees') }}" class="btn-outline-custom">Cancel</a>
                </div>

                <form method="POST" enctype="multipart/form-data">
                    <div class="row">
                        <div class="col-md-4 mb-4">
                            <label class="form-label-custom">Ranking / Serial No</label>
                            <input type="number" name="serial_no" class="form-control-custom" value="{{ emp.serial_no }}" required>
                            <small class="help-text">1 for Top Position</small>
                        </div>
                        <div class="col-md-8 mb-4">
                            <label class="form-label-custom">Full Name</label>
                            <input type="text" name="name" class="form-control-custom" value="{{ emp.name }}" required>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label-custom">Professional Designation</label>
                        <input type="text" name="designation" class="form-control-custom" value="{{ emp.designation }}" required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label-custom">Expertise Description</label>
                        <textarea name="description" class="form-control-custom" rows="6" required>{{ emp.description }}</textarea>
                    </div>

                    <div class="mb-5">
                        <label class="form-label-custom d-block">Profile Image</label>
                        <div class="d-flex align-items-center gap-4">
                            <img src="{{ url_for('static', filename='uploads/' + emp.image_file) }}" class="current-img" alt="Current Image">
                            <div class="flex-grow-1">
                                <input type="file" name="image" class="form-control-custom" accept="image/*">
                                <small class="help-text">Leave blank to keep current image</small>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-gold-submit w-100">Update Expert Credentials</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
