{% extends 'base.html' %}

{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<style>
    body {
        background-color: #050505;
        color: #ffffff;
        font-family: 'Rajdhani', sans-serif;
    }
    .contact-container {
        padding: 100px 0;
    }
    .glass-card {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(0, 242, 254, 0.2);
        border-radius: 12px;
        padding: 40px;
    }
    .hero-title-sm {
        font-family: 'Orbitron', sans-serif;
        background: -webkit-linear-gradient(#00f2fe, #4facfe);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        text-transform: uppercase;
        margin-bottom: 30px;
    }
    .form-control {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        padding: 12px;
        margin-bottom: 20px;
    }
    .form-control:focus {
        background: rgba(255, 255, 255, 0.1);
        border-color: #00f2fe;
        color: white;
        box-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
    }
    .btn-neon {
        background: transparent;
        color: #00f2fe;
        border: 2px solid #00f2fe;
        box-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
        font-weight: 700;
        text-transform: uppercase;
        width: 100%;
        padding: 15px;
        transition: 0.4s;
    }
    .btn-neon:hover {
        background: #00f2fe;
        color: #000;
        box-shadow: 0 0 25px rgba(0, 242, 254, 0.8);
    }
</style>

<div class="container contact-container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="glass-card">
                <h2 class="hero-title-sm text-center">Contact Command Center</h2>
                <form method="POST" action="{{ url_for('routes.contact') }}">
                    <div class="row">
                        <div class="col-md-6">
                            <label class="text-info small mb-2 text-uppercase fw-bold">Your Name</label>
                            <input type="text" name="name" class="form-control" placeholder="Hamid Khan" required>
                        </div>
                        <div class="col-md-6">
                            <label class="text-info small mb-2 text-uppercase fw-bold">Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="text-info small mb-2 text-uppercase fw-bold">Message Payload</label>
                        <textarea name="message" class="form-control" rows="6" placeholder="Transmission details..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-neon">Transmit Signal</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
